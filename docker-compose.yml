version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=tcp:resilio-sqlserver.database.windows.net,1433;Initial Catalog=resilio-db;Persist Security Info=False;User ID=ResilioAdmin;Password=Resilio@csp#Admin;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
      - Auth__JwtKey=MyJwtKey789SuperSecretKey123!@#
      - Auth__JwtIssuer=Resilio
      - Auth__JwtAudience=ResilioClient
      - Otp__HmacSecret=MyOtpSecret123!@#
      - TokenHashing__HmacSecret=MyTokenSecret456!@#

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend